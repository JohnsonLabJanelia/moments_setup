[global]
verbose 1
boundary_clock_jbod 1
#
# Sync the camera (slave) clocks to the grandmaster 16x/second instead of the
# linuxptp 1 Hz default. At 1 Hz each camera free-runs ~1 s between corrections,
# so its clock drifts vs cam1 (which drives the strobe) and then snaps back at
# the next Sync — a sawtooth phase error that shows up as cyclical dimming on the
# other cameras. log2(seconds): -4 => 2^-4 s = 62.5 ms between Sync messages.
# logMinDelayReqInterval is matched so path-delay tracking keeps pace.
# (ConnectX-7 hardware timestamping handles this easily; raise to -6 = 64 Hz if
# any residual drift remains.)
logSyncInterval -4
logMinDelayReqInterval -4
